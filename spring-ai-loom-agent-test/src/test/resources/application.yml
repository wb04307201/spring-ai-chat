spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen3.6-plus
          multi_model: true
          enable_thinking: true
      embedding:
        options:
          model: text-embedding-v2
server:
  port: 8089
logging:
  level:
    org:
      springframework:
        ai: DEBUG
