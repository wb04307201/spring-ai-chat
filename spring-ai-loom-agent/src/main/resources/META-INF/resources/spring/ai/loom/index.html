<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>灵梭</title>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <script src="/marked@17.0.1/lib/marked.umd.js"></script>
</head>
<body>
<div class="container">
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="toolbar-btn" id="sidebar-toggle" style="display:none;">☰</button>
            <div class="logo"></div>
            <div class="header-title">灵梭</div>
        </div>
        <div class="header-actions">
            <!-- additional header actions can go here -->
        </div>
    </header>

    <div class="app-body">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>对话历史</h3>
                <button class="new-chat-btn" id="new-chat-btn">
                    <span>+</span>
                    <span>新建对话</span>
                </button>
            </div>
            <div class="sidebar-list" id="sidebarList">
                <div class="sidebar-empty">暂无对话</div>
            </div>
        </aside>

        <!-- Main Area -->
        <main class="main-area">
            <!-- Chat Content -->
            <div class="chat-content" id="mainContent">
                <div class="welcome-message">
                    <h2>你好！我是你的 AI 助手</h2>
                    <p>有什么我可以帮助你的吗？现在可以开始聊天了</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="toolbar">
                    <button class="toolbar-btn" id="ks-button">
                        <span>📚</span>
                        <span>知识空间</span>
                    </button>
                    <button class="toolbar-btn" id="mcp-button" style="display: none;">
                        <span>🔧</span>
                        <span>MCP服务</span>
                    </button>
                    <button class="toolbar-btn" id="skills-button" style="display: none;">
                        <span>🧠</span>
                        <span>技能库</span>
                    </button>
                </div>
                <textarea id="textarea" placeholder="输入消息... (Ctrl+Enter 换行，Enter 发送)"></textarea>
                <div class="image-upload-area" id="image-upload-area" style="display: none;">
                    <div class="image-thumbnails" id="image-thumbnails"></div>
                </div>
                <div class="input-row">
                    <button class="image-add-btn" id="image-add-btn" title="添加图片">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <input type="file" id="image-file-input" accept="image/jpeg,image/png,image/gif,image/webp,image/bmp" style="display: none;">
                    <div class="button-area">
                        <button id="send-btn">发送消息</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast-notification"></div>

    <!-- Image Viewer Modal -->
    <div id="image-viewer-overlay" class="image-viewer-overlay" style="display: none;">
        <div class="image-viewer-content">
            <img id="viewer-image" src="" alt="原图">
            <button class="viewer-close" id="viewer-close" title="关闭">&times;</button>
            <div class="viewer-hint">点击图片外部或按 ESC 关闭</div>
        </div>
    </div>

    <!-- MCP Modal -->
    <div id="mcp-modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-content skills-modal-layout">
            <div class="skills-sidebar">
                <div class="skills-sidebar-header">
                    <h3>MCP服务</h3>
                </div>
                <div class="skills-list" id="mcp-list"></div>
            </div>
            <div class="skills-detail-panel">
                <div class="skills-detail-header">
                    <h3 class="skills-detail-title" id="mcp-detail-title">MCP详情</h3>
                    <div class="close-button" id="mcp-close-btn">&times;</div>
                </div>
                <div class="skills-detail-body" id="mcp-detail">
                    <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                        <p style="font-size: 16px; margin-bottom: 8px;">请选择一个MCP服务查看详情</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Skills Modal -->
    <div id="skills-modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-content skills-modal-layout">
            <div class="skills-sidebar">
                <div class="skills-sidebar-header">
                    <h3>技能库</h3>
                </div>
                <div class="skills-list" id="skills-list"></div>
            </div>
            <div class="skills-detail-panel">
                <div class="skills-detail-header">
                    <h3 class="skills-detail-title" id="skill-detail-title">技能详情</h3>
                    <div class="close-button" id="skills-close-btn">&times;</div>
                </div>
                <div class="skills-detail-body" id="skills-detail">
                    <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                        <p style="font-size: 16px; margin-bottom: 8px;">请选择一个技能查看详情</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Knowledge Space Modal (full-screen panel) -->
    <div id="ks-modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 1000px; max-height: 85vh;">
            <div class="modal-header">
                <h3>知识空间</h3>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button class="ks-create-btn">+ 创建知识库</button>
                    <div class="close-button">&times;</div>
                </div>
            </div>
            <div class="modal-body" style="padding: 0; flex: 1; display: flex; flex-direction: column;">
                <div class="ks-body" style="flex: 1; min-height: 500px;">
                    <div class="ks-sidebar" id="ks-sidebar">
                        <div class="sidebar-empty" style="padding: 40px 16px;">暂无知识库</div>
                    </div>
                    <div class="ks-detail" id="ks-detail">
                        <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                            <p style="font-size: 16px; margin-bottom: 8px;">选择一个知识库查看文件</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</div>
</body>
</html>
